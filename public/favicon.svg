<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#0a0a0a"/>

  <!-- Film reel: center circle -->
  <circle cx="50" cy="50" r="12" fill="none" stroke="#e5d5c0" stroke-width="2"/>

  <!-- Film reel: outer circle -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="#e5d5c0" stroke-width="2"/>

  <!-- Film reel: spokes (8 spokes) -->
  <line x1="50" y1="15" x2="50" y2="85" stroke="#e5d5c0" stroke-width="1.5"/>
  <line x1="15" y1="50" x2="85" y2="50" stroke="#e5d5c0" stroke-width="1.5"/>
  <line x1="26.5" y1="26.5" x2="73.5" y2="73.5" stroke="#e5d5c0" stroke-width="1.5"/>
  <line x1="73.5" y1="26.5" x2="26.5" y2="73.5" stroke="#e5d5c0" stroke-width="1.5"/>

  <!-- Film strip circles on the reel -->
  <circle cx="50" cy="18" r="3" fill="#e5d5c0"/>
  <circle cx="65" cy="24" r="3" fill="#e5d5c0"/>
  <circle cx="75" cy="37" r="3" fill="#e5d5c0"/>
</svg>